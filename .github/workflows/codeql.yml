name: CodeQL

# Static analysis of this repo's GitHub Actions workflows (CodeQL
# `actions` analysis catches workflow-injection / untrusted-input bugs —
# e.g. unsanitized repository_dispatch client_payload reaching a shell or
# a checkout ref). Runs here on the PUBLIC syntaur-dist repo so it is
# free and publicly auditable, and because release-sign.yml — which
# checks out private source and signs binaries — is the most
# security-sensitive workflow surface in the project.
#
# Rust static analysis (clippy + cargo-audit) runs against the source in
# the private repo; this scan deliberately covers the workflow layer that
# moved out to dist during the privatization migration.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 0'   # weekly deep scan, Sundays 06:00 UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/language:${{ matrix.language }}"
