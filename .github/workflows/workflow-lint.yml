name: Workflow lint

on:
  push:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
      - 'scripts/validate-release-workflow.sh'
      - 'scripts/test-release-workflow-recovery.sh'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
      - 'scripts/validate-release-workflow.sh'
      - 'scripts/test-release-workflow-recovery.sh'

permissions:
  contents: read

jobs:
  release-workflow:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24.x'

      - name: Install pinned workflow validators
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          go install github.com/mikefarah/yq/v4@v4.47.2

      - name: Validate release workflow and embedded Bash
        run: bash scripts/validate-release-workflow.sh
