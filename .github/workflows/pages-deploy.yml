name: Deploy landing page to Pages

# Publishes landing/ to GitHub Pages from the PUBLIC syntaur-dist repo.
# Main's Pages went away when that repo was made private (Pages is
# disabled on private repos on the Free plan), so the public marketing
# page now lives here at https://buddyholly007.github.io/syntaur-dist/.
# Intentionally NOT gated on the VERSION badge: no live domain depends on
# this page and the release flow does not sync a badge into this repo, so
# a strict gate would only create drift failures.

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/
      - id: deployment
        uses: actions/deploy-pages@v4
